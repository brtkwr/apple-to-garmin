name: 🧪 Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        include:
          - python-version: '3.14'
            coverage: true

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: 📦 Install uv
      uses: astral-sh/setup-uv@v4

    - name: 🧪 Run tests
      run: |
        uv run pytest --cov=convert_healthkit_to_fit --cov=fetch_healthkit --cov=mock_server --cov-report=xml:coverage.xml --cov-report=term-missing -v

    - name: 📊 Coverage report
      uses: orgoro/coverage@v3.2
      if: ${{ github.event_name == 'pull_request' && matrix.coverage }}
      with:
        coverageFile: coverage.xml
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🔍 Run basic smoke tests
      run: |
        uv run convert_healthkit_to_fit.py --help

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install uv
      uses: astral-sh/setup-uv@v4

    - name: 🔍 Check Python syntax
      run: |
        python -m py_compile convert_healthkit_to_fit.py
        python -m py_compile fetch_healthkit.py

  build-ios:
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🍎 Build iOS app
      run: |
        xcodebuild -project HealthKitExporter.xcodeproj \
          -scheme HealthKitExporter \
          -destination 'generic/platform=iOS Simulator' \
          -allowProvisioningUpdates \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_ALLOWED=NO \
          build
